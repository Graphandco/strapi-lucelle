services:
   app:
      container_name: lucelle-app
      image: ghcr.io/graphandco/lucelle-app-supabase:latest
      # Sans ça, Docker réutilise l’ancienne image locale même si `latest` a été repoussé sur GHCR.
      pull_policy: always
      restart: unless-stopped
      # ports:
      #    - "3001:3001"
      # Optionnel : surcharge / variables si l’image n’a pas les NEXT_PUBLIC_* au build.
      env_file:
         - path: .env
           required: false
      networks:
         - web-network

      # Sécurité de base (Hardening)
      cpus: 0.5
      mem_limit: 512m
      read_only: true
      security_opt:
         - no-new-privileges:true
      tmpfs:
         - /tmp:rw,noexec,nosuid,size=128m
      volumes:
         - next_cache:/app/.next/cache

      # Logs maîtrisés
      logging:
         driver: "json-file"
         options:
            max-size: "10m"
            max-file: "3"
volumes:
   next_cache:

networks:
   web-network:
      external: true
